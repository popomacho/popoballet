<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>送信完了 | POPO Ballet</title>
<meta name="description" content="POPO Ballet お問い合わせ・注文送信完了ページ" />
<meta http-equiv="refresh" content="5; url=index.html" />
<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Yu Gothic", "Hiragino Kaku Gothic ProN", Arial, sans-serif;
  background: linear-gradient(to bottom, #fdf4f7, #fffefe);
  color: #222;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.thanks-wrap {
  width: 100%;
  max-width: 520px;
  background: rgba(255,255,255,0.96);
  border: 1px solid #f0dede;
  border-radius: 24px;
  padding: 32px 22px;
  text-align: center;
  box-shadow: 0 14px 34px rgba(0,0,0,0.06);
}

.logo-box {
  width: 84px;
  height: 84px;
  margin: 0 auto 18px;
  border-radius: 18px;
  background: #f8eaea;
  border: 1px solid #ead9d9;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.logo-box img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.thanks-sub {
  font-size: 12px;
  letter-spacing: 1.2px;
  color: #9b7d7d;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.thanks-title {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 12px;
}

.thanks-text {
  font-size: 15px;
  line-height: 1.8;
  color: #555;
  margin-bottom: 22px;
}

.count-box {
  display: inline-block;
  padding: 10px 16px;
  border-radius: 999px;
  background: linear-gradient(135deg, #f6dede, #ffffff);
  border: 1px solid #efd5d5;
  font-size: 13px;
  font-weight: 700;
  color: #7f6666;
  margin-bottom: 20px;
}

.btn-home {
  display: inline-block;
  padding: 12px 22px;
  border-radius: 999px;
  background: #222;
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  text-decoration: none;
}

.note {
  margin-top: 16px;
  font-size: 12px;
  color: #999;
}

@media (min-width: 768px) {
  .thanks-wrap {
    padding: 40px 30px;
  }

  .thanks-title {
    font-size: 32px;
  }
}
</style>
</head>
<body>
  <div class="thanks-wrap">
    <div class="logo-box">
      <img src="images/logo.jpg" alt="POPO Ballet ロゴ">
    </div>

    <div class="thanks-sub">Thank You</div>
    <h1 class="thanks-title">送信ありがとうございました</h1>

    <p class="thanks-text">
      ご注文内容・お問い合わせ内容を受け付けました。<br>
      内容を確認のうえ、順次ご連絡いたします。
    </p>

    <div class="count-box">
      5秒後にトップページへ戻ります
    </div>

    <div>
      <a href="index.html" class="btn-home">トップページへ戻る</a>
    </div>

    <div class="note">
      自動で切り替わらない場合は、上のボタンを押してください。
    </div>
  </div>
</body>
</html>
